name: Dashboard y Reporte Diario

on:
  schedule:
    - cron: '0 22 * * *'   # 19:00 Chile (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl requests numpy gspread google-auth

      # ── PASO 1: Actualización diaria del historial ─────────────
      # Agrega ventas y guías nuevas (API) y deduce recepciones/consumos
      # comparando el stock real con la foto del día anterior.
      # El historial actualizado se guarda en el repo (única fuente de verdad).
      - name: Actualizar historial diario
        env:
          BSALE_TOKEN: ${{ secrets.BSALE_TOKEN }}
          TZ: America/Santiago
        run: python actualizar_diario.py

      - name: Guardar historial y foto de stock en el repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historial.json stock_snapshot.json alertas_stock.json
          git diff --staged --quiet || (git commit -m "Actualizacion diaria: ventas, guias y recepciones inferidas" && git push)

      # ── PASO 2: Generar dashboard + velocidades.json ───────────
      # La credencial de Google Sheets permite leer las recetas para la pestaña
      # Producción. Si el secret no está configurado, el dashboard se genera
      # igual pero con las recetas vacías (leer_recetas devuelve {}).
      - name: Preparar credencial de Google Sheets (recetas)
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > la-cocina-498520-9b115beec377.json
          else
            echo "AVISO: secret GOOGLE_SERVICE_ACCOUNT_JSON no configurado — el dashboard saldrá sin recetas"
          fi

      - name: Generar dashboard
        env:
          BSALE_TOKEN: ${{ secrets.BSALE_TOKEN }}
        run: python generar_dashboard.py

      # ── PASO 2: Enviar correo (usa velocidades.json del paso 1)
      - name: Enviar reporte por correo
        env:
          BSALE_TOKEN: ${{ secrets.BSALE_TOKEN }}
          GMAIL_REMITENTE: ${{ secrets.GMAIL_REMITENTE }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          CORREOS_DESTINO: ${{ secrets.CORREOS_DESTINO }}
          TZ: America/Santiago
        run: python bsale_github.py

      # ── PASO 3: Publicar dashboard en GitHub Pages ────────────
      - name: Preparar carpeta de deploy
        run: |
          mkdir -p /tmp/deploy
          cp dashboard.html /tmp/deploy/index.html

      - name: Publicar en gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/deploy
          commit_message: "Dashboard actualizado ${{ github.run_number }}"
