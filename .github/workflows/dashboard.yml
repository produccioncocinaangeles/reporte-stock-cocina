name: Dashboard y Reporte Diario

on:
  schedule:
    - cron: '0 22 * * *'   # 19:00 Chile (UTC-3)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl requests numpy

      # NOTA: el historial.json versionado en el repo es la fuente de verdad.
      # No se reconstruye en cada corrida (eso causaba que GitHub difiriera del
      # clon). Para actualizar ventas/despachos: correr excel_a_historial.py
      # localmente y commitear el historial.json actualizado.

      # ── Generar dashboard + velocidades.json (usa historial.json del repo) ──
      - name: Generar dashboard
        env:
          BSALE_TOKEN: ${{ secrets.BSALE_TOKEN }}
        run: python generar_dashboard.py

      # ── PASO 2: Enviar correo (usa velocidades.json del paso 1)
      - name: Enviar reporte por correo
        env:
          BSALE_TOKEN: ${{ secrets.BSALE_TOKEN }}
          GMAIL_REMITENTE: ${{ secrets.GMAIL_REMITENTE }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          CORREOS_DESTINO: ${{ secrets.CORREOS_DESTINO }}
          TZ: America/Santiago
        run: python bsale_github.py

      # ── PASO 3: Publicar dashboard en GitHub Pages ────────────
      - name: Preparar carpeta de deploy
        run: |
          mkdir -p /tmp/deploy
          cp dashboard.html /tmp/deploy/index.html

      - name: Publicar en gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/deploy
          commit_message: "Dashboard actualizado ${{ github.run_number }}"
