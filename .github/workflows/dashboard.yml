name: Generar y publicar dashboard

on:
  schedule:
    - cron: '0 11 * * *'   # 8:00 AM Chile (UTC-3)
  workflow_dispatch:         # permite ejecutar manualmente desde GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install pandas openpyxl requests numpy

      - name: Generar dashboard
        env:
          BSALE_TOKEN: ${{ secrets.BSALE_TOKEN }}
        run: python generar_dashboard.py

      - name: Guardar velocidades.json en repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add velocidades.json
          git diff --staged --quiet || git commit -m "Actualizar velocidades.json"
          git push origin main

      - name: Preparar carpeta de deploy
        run: |
          mkdir -p /tmp/deploy
          cp dashboard.html /tmp/deploy/index.html

      - name: Publicar en gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/deploy
          commit_message: "Dashboard actualizado ${{ github.run_number }}"
