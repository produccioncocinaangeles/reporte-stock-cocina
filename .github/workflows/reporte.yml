name: Reporte Stock Cocina (desactivado - reemplazado por dashboard.yml)

on:
  workflow_dispatch:   # solo manual, no corre automaticamente

jobs:
  reporte:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar librerias
        run: pip install requests openpyxl
      - name: Ejecutar script
        env:
          BSALE_TOKEN: ${{ secrets.BSALE_TOKEN }}
          GMAIL_REMITENTE: ${{ secrets.GMAIL_REMITENTE }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          CORREOS_DESTINO: ${{ secrets.CORREOS_DESTINO }}
          TZ: America/Santiago
        run: python bsale_github.py
